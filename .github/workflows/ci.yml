name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: 1.24.x
          - os: ubuntu-latest
            go-version: 1.25.x
          - os: ubuntu-latest
            go-version: 1.26.x
          - os: macos-latest
            go-version: 1.24.x
          - os: windows-latest
            go-version: 1.24.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build package tests
        run: go test -c ./internal/transport
